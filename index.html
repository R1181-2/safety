<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目信息展示</title>
    <style>
        /* 这里的 CSS 是为了让手机显示更漂亮 */
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #ffffff; width: 100%; max-width: 500px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .content { padding: 20px; }
        h1 { color: #333; font-size: 22px; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; font-size: 16px; white-space: pre-wrap; }
        img { width: 100%; height: auto; display: block; }
        .footer { background: #eee; padding: 10px; text-align: center; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <img src="pic.jpg" alt="现场图片">
        
        <div class="content">
            <h1>这里输入你的标题</h1>
            <p>这里输入你想展示的内容。
例如：
1. 现场施工进度说明
2. 公示
3. 联系人</p>
        </div>
        
        <div class="footer">
            内容实时更新 · GitHub Pages 托管
        </div>
    </div>
</body>
</html>
